services:
  - type: web
    name: opencode-crm
    env: node
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
