name: opencode_crm_app
description: "OpenCode CRM - Enterprise Parent & Student Mobile App"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & Data
  dio: ^5.4.0
  connectivity_plus: ^6.1.2

  # Storage
  flutter_secure_storage: ^9.2.2

  # State Management
  flutter_riverpod: ^2.6.1
  provider: ^6.1.5

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1

  # Notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # Navigation
  go_router: ^14.8.1

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
